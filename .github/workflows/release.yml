name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            output: atur.exe
            asset_name: atur-windows-amd64.exe

          - os: macos-latest
            platform: darwin/amd64
            output: atur
            asset_name: atur-macos-amd64

          - os: ubuntu-22.04
            platform: linux/amd64
            output: atur
            asset_name: atur-linux-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            build-essential \
            pkg-config

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -platform ${{ matrix.platform }} -o ${{ matrix.output }}

      - name: Ekstrak dari arsip (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd build/bin
          $zip = Get-ChildItem -Filter "*.zip" | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath . -Force
        shell: pwsh

      - name: Ekstrak dari arsip (macOS & Linux)
        if: matrix.os != 'windows-latest'
        run: |
          cd build/bin
          tar -xzf *.tar.gz || true

      - name: Rename binary
        run: |
          mv build/bin/${{ matrix.output }} build/bin/${{ matrix.asset_name }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: build/bin/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Buat Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## Download

            | Platform | File |
            |----------|------|
            | Windows  | `atur-windows-amd64.exe` — langsung klik untuk menjalankan |
            | macOS    | `atur-macos-amd64` — klik kanan → Open |
            | Linux    | `atur-linux-amd64` — `chmod +x atur-linux-amd64` lalu jalankan |
