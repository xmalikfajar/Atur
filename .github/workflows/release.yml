name: Release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - name: 'atur'
            platform: 'linux/amd64'
            os: 'ubuntu-22.04'
            asset_name: 'atur-linux-amd64'

          - name: 'atur'
            platform: 'windows/amd64'
            os: 'windows-latest'
            asset_name: 'atur-windows-amd64.exe'

          - name: 'atur'
            platform: 'darwin/universal'
            os: 'macos-latest'
            asset_name: 'atur-macos-universal'

    runs-on: ${{ matrix.build.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: matrix.build.os == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            build-essential \
            pkg-config

      - name: Build (Linux & macOS)
        if: matrix.build.os != 'windows-latest'
        run: wails build -platform ${{ matrix.build.platform }} -o ${{ matrix.build.asset_name }}

      - name: Build (Windows)
        if: matrix.build.os == 'windows-latest'
        run: wails build -platform ${{ matrix.build.platform }} -o ${{ matrix.build.asset_name }}
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.build.asset_name }}
          path: build/bin/${{ matrix.build.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Buat Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## Download

            | Platform | File |
            |----------|------|
            | Windows  | `atur-windows-amd64.exe` — langsung klik untuk menjalankan |
            | macOS    | `atur-macos-universal` — klik kanan → Open |
            | Linux    | `atur-linux-amd64` — `chmod +x atur-linux-amd64` lalu jalankan |